name: RDP

on: 
  workflow_dispatch:

jobs:
  secure-rdp:
    runs-on: windows-latest

    steps:
    - name: Configure Core RDP Settings
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

    - name: Create RDP User
      run: |
        $Password = ConvertTo-SecureString "PhonePass123!" -AsPlainText -Force
        New-LocalUser "RDP" -Password $Password -Description "RDP User"
        Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RDP"
        Add-LocalGroupMember -Group "Administrators" -Member "RDP"

    - name: Install Tailscale
      run: |
        # Скачиваем официальный стабильный MSI-пакет (полная версия)
        Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-1.98.2-amd64.msi" -OutFile "tailscale.msi"
        # Запускаем тихую установку MSI
        Start-Process msiexec.exe -ArgumentList '/i tailscale.msi /qn /norestart' -Wait

    - name: Start Tailscale
      shell: cmd
      run: |
        "C:\Program Files\Tailscale\tailscale.exe" up --authkey=tskey-auth-kUFd7FjD1s11CNTRL-PDGwnGpH7p2B8rLpykAjo2BMjQ7sifp6

    - name: Verify RDP Access
      run: |
        $tsIp = (& "C:\Program Files\Tailscale\tailscale.exe" ip -4)
        Write-Host "--- TAILSCALE UP ---"
        Write-Host "Tailscale IP: $tsIp"
        Write-Host "--- YOUR RDP READY ---"
        Write-Host "User: RDP"
        Write-Host "Pass: PhonePass123!"

    - name: Keep Alive
      run: |
        $TargetTime = (Get-Date).AddHours(6)
        while ((Get-Date) -lt $TargetTime) {
            Start-Sleep -Seconds 60
            Write-Host "Running..."
        }
        
